<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al UteTriC Circus</title>
    <style>
        body { 
            background-image: url('img/fcerrado.jpeg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000000;
            margin: 0;
            height: 100vh;
        }

        .cartel-potencia {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            z-index: 10;
            opacity: 0;
            animation: caerCartel 1.5s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
            animation-delay: 0.5s;
        }

        .imagen-animada {
            position: absolute;
            animation-duration: 1.5s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
            transition: transform 0.3s ease;
        }

        .imagen-animada:hover {
            transform: scale(1.1);
            cursor: pointer;
        }

        /* Escritorio */
        .v-ordenador { top: 40%; width: 300px; animation-name: entrarDerecha; }
        .v-movil { top: 35%; width: 280px; animation-name: entrarIzquierda; }

        @keyframes caerCartel {
            0% { transform: translate(-50%, -100%); opacity: 0; }
            100% { transform: translate(-50%, 0%); opacity: 1; }
        }

        @keyframes entrarDerecha {
            from { left: -300px; opacity: 0; }
            to { left: 25%; opacity: 1; } 
        }

        @keyframes entrarIzquierda {
            from { right: -300px; opacity: 0; }
            to { right: 25%; opacity: 1; } 
        }

        /* --- CORRECCIONES PARA MÓVIL --- */
        @media (max-width: 768px) {
            .imagen-animada {
                animation: none !important;
                opacity: 1 !important;               
                left: 50% !important;
                transform: translateX(-50%) !important;
                width: 220px !important;
            }

            .v-ordenador { top: 30% !important; }
            .v-movil { top: 55% !important; }

            .cartel-potencia { width: 160px !important; }
        }
    </style>
</head>
<body>
    <img src="img/cartel-p.png" class="cartel-potencia" alt="Cartel Informativo">

    <a href="Inicio-ordenador.html">
        <img src="img/vordenador.png" class="imagen-animada v-ordenador" alt="Versión Ordenador">
    </a>

    <a href="Inicio-movil.html">
        <img src="img/vmovil.png" class="imagen-animada v-movil" alt="Versión Móvil">
    </a>
</body>
</html>
