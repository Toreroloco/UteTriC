<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <title>UteTriC Circus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: black; }

        .capa { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

        .capa-gradas { 
            background-image: url('img/fondo1.jpg'); 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: 100% 100%; 
            z-index: 1; 
        }

        .capa-telon { 
            background-image: url('img/Fondo-m.png'); 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: cover; 
            z-index: 2; 
            animation: soloCaer 1.5s ease-out forwards;
            animation-delay: 0.4s;
            animation-fill-mode: backwards;
}
        .capa-interfaz { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 3; pointer-events: auto; 
        }

       .cartel-principal-btn {
    background: none; 
    border: none; 
    cursor: pointer;
    position: absolute; 
    top: -2%; 
    left: 41%; 
    width: 235px;
    z-index: 5; 
    transition: transform 0.3s ease;
    animation: soloCaerCartel 1.5s ease-out forwards;
    animation-delay: 0.4s;
    animation-fill-mode: backwards;
}

.cartel-principal-btn:hover { 
    transform: scale(1.15) translateY(0);
}
        .shows {
            position: absolute;
            top: 45%; 
            width: 300px;
            animation: entrarshows 1.5s cubic-bezier(0.20, 0.50, 0.36, 1) forwards;
            animation-delay: 1.0s; 
            opacity: 0;
            display: block;
            transition: transform 0.4s ease, box-shadow 0.4s ease; 
            transform: scale(1);
            will-change: transform;
        }

        .shows:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
        
        .contenedor-flecha {
            position: absolute;
            z-index: 4;
            animation: entrarFlechas 1.0s cubic-bezier(0.20, 0.55, 0.30, 1) forwards;
            animation-delay: 1.0s; 
            opacity: 0;
        }

        .flecha {
            background: none; 
            border: none; 
            cursor: pointer;
            width: 270px;
            transition: transform 0.3s ease-in-out;
            transform-origin: center;
        }

        .flecha:hover {
            transform: scale(1.1); 
        }

        .f-izquierda { top: 47%; left: 15%;
        clip-path: polygon(0% 25%, 65% 25%, 65% 0%, 100% 50%, 65% 100%, 65% 75%, 0% 75%);
        } 
        .f-derecha { top: 65%; left: 15%; 
        clip-path: polygon(0% 25%, 65% 25%, 65% 0%, 100% 50%, 65% 100%, 65% 75%, 0% 75%);
        }
        .f-croquis { top: 29%; left: 15%;
            clip-path: polygon(0% 25%, 65% 25%, 65% 0%, 100% 50%, 65% 100%, 65% 75%, 0% 75%);
        }
        .f-menu { top: 9%; left: 15%;
            clip-path: polygon(0% 25%, 65% 25%, 65% 0%, 100% 50%, 65% 100%, 65% 75%, 0% 75%);
        }

        .ventana-info {
            position: absolute; 
            top: 20%; 
            left: 30%; 
            width: 40%;
            background-color: #d1aa7d;
            border: 4px solid #5f0000; 
            color: #000000;
            padding: 30px; 
            display: block;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            z-index: 10;
            border-radius: 15px;
            font-family: 'Rye', cursive;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
            max-height: 70vh;
             overflow-y: auto;
        }
        
        .ventana-info.activa {
            opacity: 1;
            visibility: visible;
            font-family: 'Rye', cursive;
        }
       .ventana-info h2 {
            font-size: 32px;
            color: #5f0000;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 2px solid #5f0000;
            padding-bottom: 10px;
            font-family: 'Rye', cursive;
        }

        .ventana-info h3 {
            font-size: 22px;
            color: #4a0000;
            margin-top: 20px;
            margin-bottom: 5px;
            font-family: 'Rye', cursive;
        }

        .ventana-info p {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: justify;
            line-height: 1.6;
            font-family: 'Rye', cursive;
        }

        .cerrar {
            background-color: #5f0000;
            color: #d1aa7d;
            border: none;
            padding: 3px 3px;
            cursor: pointer;
            font-weight: bold;
            float: right;
        }

        /* ANIMACIONES */
        @keyframes soloCaer {
    0% { transform: translateY(-100vh); }
    100% { transform: translateY(0); }
}

@keyframes soloCaerCartel {
    0% { transform: translateY(-100vh); }
    100% { transform: translateY(0); }
}

        @keyframes entrarFlechas {
    0% { opacity: 0; transform: translateX(-50px); }
    100% { opacity: 1; transform: translateX(0); }
}
      @keyframes entrarshows {
            0% { left: 100%; opacity: 1; }
            100% { left: 70%; opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="capa capa-gradas"></div>
    <div class="capa capa-telon"></div>

    <div class="capa capa-interfaz">

        <a href="Shows-movil.html">
            <img src="img/shows.png" class="shows">
        </a>

        <div class="contenedor-flecha f-izquierda">
            <button class="flecha" onclick="abrirInfo('proyecto')">
                <img src="img/proyecto-m.png" style="width:100%;">
            </button>
        </div>
        <div class="contenedor-flecha f-croquis">
    <button class="flecha" onclick="abrirInfo('croquis')">
        <img src="img/croquis-m.png" style="width:100%;">
    </button>
</div>

<div class="contenedor-flecha f-menu">
    <button class="flecha" onclick="abrirInfo('menu')">
        <img src="img/menu-m.png" style="width:100%;">
    </button>
</div>

        <div class="contenedor-flecha f-derecha">
            <button class="flecha" onclick="abrirInfo('ra')">
                <img src="img/ra-m.png" style="width:100%;">
            </button>
        </div>

        <button class="cartel-principal-btn" onclick="abrirInfo('bienvenida')">
    <img src="img/cartel.png" style="width:100%;">
</button>

        <div id="ventana-info" class="ventana-info">
            <button class="cerrar" onclick="cerrarInfo()">X</button>
            <div id="contenido-info"></div>
        </div>
    </div>

    <script>
    let audioActual = null;

    function toggleAudio(url) {
        if (audioActual && audioActual.src.includes(url)) {
            if (!audioActual.paused) {
                audioActual.pause();
            } else {
                audioActual.play();
            }
        } else {
            if (audioActual) audioActual.pause();
            audioActual = new Audio(url);
            audioActual.play();
        }
    }

    function abrirInfo(seccion) {
        const ventana = document.getElementById('ventana-info');
        const contenido = document.getElementById('contenido-info');

        if (seccion === 'croquis') {
        contenido.innerHTML = `
            <h2>Croquis de UteTriC</h2>
            <p>Aquí puedes ver el mapa de las instalaciones y dónde encontrar cada atraccion.</p>
            <img src="img/mapa_circo.png" style="width:100%; border-radius:10px;">
        `;
    } else if (seccion === 'menu') {
        contenido.innerHTML = `
            <h2>Nuestro Menú</h2>
            <img src="img/menug.jpeg" style="width:100%; border-radius:10px;">
        `;
    }
        
        if (seccion === 'bienvenida') {
            contenido.innerHTML = `
                <h2>UTETRIC CIRCUS</h2>
                <p>Bienvenidos a lo Extraordinario</p>
                <h3>ESPAÑOL 
                    <button onclick="toggleAudio('audio/Español.mp3')">🔊</button>
                </h3>
                <p>Cuentan las leyendas que, una vez al año, una misteriosa carpa roja y negra aparece en la UTC. "Entra si te atreves... Dentro del UteTriC Circus, lo imposible cobra vida. Acróbatas, artistas y creadores muestran talentos extraordinarios mientras la magia y el misterio envuelven cada rincón.

 Sin embargo, el verdadero secreto del circo no se encuentra entre las sombras, sino en cada estudiante, porque cada talento es un espectáculo y cada sueño tiene un lugar bajo la gran carpa.

 Bienvenidos al UteTriC Circus, donde la creatividad cobra vida y lo extraordinario se vuelve realidad."</p>
                <h3>ENGLISH 
                    <button onclick="toggleAudio('audio/Ingles.mp3')">🔊</button>
                </h3>
                <p>Legend says that once a year, a mysterious red-and-black circus tent appears at UTC. "Enter if you dare... Inside the UteTriC Circus, the impossible comes to life. Acrobats, artists, and creators showcase extraordinary talents while mystery and magic fill every corner.

 Yet the true secret of the circus is not hidden in the shadows—it lives within every student, where every talent becomes a performance and every dream finds its place beneath the big top.

 Welcome to UteTriC Circus, where creativity comes to life and the extraordinary becomes reality."</p>
            `;
        } else if (seccion === 'proyecto') {
            contenido.innerHTML = `
                <h2>Proyecto</h2>
                <h3>Misión</h3>
                <p>La organización busca transformar el aprendizaje y la convivencia en una experiencia artística e inmersiva.</p>
                <h3>Visión</h3>
                <p>Aspiramos a ser un referente global en la educación artística.</p>
                <h3>Valores</h3>
                <p>Creatividad, Inclusión, Disciplina, Pasión, Colaboración, Innovación y Sostenibilidad.</p>
            `;
        } else if (seccion === 'ra') {
            contenido.innerHTML = `
                <h2>Realidad Aumentada</h2>
                <p>Se buso desarrollar una aplicación móvil de realidad aumentada para el evento Utetric Circus que permita a los asistentes localizar y capturar personajes virtuales distribuidos en distintas zonas del lugar, mediante el uso de geolocalización y la cámara del dispositivo, con el fin de gamificar la experiencia del evento y aumentar la interacción del público con el espacio y los personajes del circo.</p>
                <h3>Objetivo general</h3>
                <p>"Llevar a cabo de manera organizada el proyecto temático"Ute TriC Circus", integrando una página web interactiva, elementos de realidad aumentada y un stand temático inspirado en la estética de Tim Burton, mediante la planeación, diseño y recopilación de evidencias de cada equipo, con el fin de presentar una experiencia funcional, creativa, interactiva y comprensible para los visitantes durante la exposición del 6 al 10 de julio.</p>
            `;
        }
        
        ventana.classList.add('activa');
    }

    function cerrarInfo() {
        if (audioActual) {
            audioActual.pause();
            audioActual.currentTime = 0;
        }
        document.getElementById('ventana-info').classList.remove('activa');
    }
</script>
</body>
</html>
